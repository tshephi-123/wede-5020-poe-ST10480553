        <main>
            <section style="max-width: 600px; margin: 0 auto;">
                <h1>Connect With Our Team</h1>
            <p>If you are in immediate need of guidance, wish to join our active volunteer groups, or plan to register as a service partner, please submit your details below.</p>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="username">Full Name:</label>
                    <input type="text" id="username" name="username" required placeholder="Jane Doe">
                </div>
                
                <div class="form-group">
                    <label for="useremail">Email Address:</label>
                    <input type="email" id="useremail" name="useremail" required placeholder="jane@example.com">
                </div>
                
                <div class="form-group">
                    <label for="purposeselect">I am reaching out to:</label>
                    <select id="purposeselect" name="purposeselect" required>
                        <option value="">-- Select Purpose --</option>
                        <option value="crisis">Seek Emergency Pregnancy Support</option>
                        <option value="volunteer">Apply to Volunteer as a Care Worker</option>
                        <option value="donate">Inquire About Making Material Donations</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="usermessage">Message details:</label>
                    <textarea id="usermessage" name="usermessage" rows="5" required placeholder="How can our community help you today?"></textarea>
                </div>
                
                <button type="submit" class="cta-button" style="border: none; cursor: pointer; width: 100%;">Submit Secured Enquiry</button>
            </form>
            </section>
            

        </main>
